<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertly | DOCX to PDF</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <nav>
        <div class="logo">Convertly<span>.</span></div>
        <button id="theme-toggle" class="btn-icon">🌓</button>
    </nav>

    <main>
        <div class="hero">
            <h1>Convert your files <span class="text-gradient">Seamlessly.</span></h1>
            <p>Simple, Fast, and Secure. All processing happens in your browser.</p>
        </div>

        <div class="converter-card">
            <div class="upload-area" id="drop-zone">
                <input type="file" id="file-input" accept=".docx" hidden>
                <div class="upload-icon">📄</div>
                <p id="file-name">Drag & drop your <b>.docx</b> file here or click to browse</p>
            </div>

            <button id="convert-btn" class="btn-primary" disabled>Convert to PDF</button>
            
            <div id="status" class="status-msg"></div>
        </div>
    </main>

    <div id="preview-container" style="display: none;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
